<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>South of Canal – Fleet Chargers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    html, body, #map { height: 100%; margin: 0; }

    .filter-panel {
      background: rgba(255,255,255,0.96);
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.18);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 13px;
      min-width: 240px;
    }
    .filter-title { font-weight: 700; margin-bottom: 8px; }
    .filter-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; flex-wrap: wrap; }
    .filter-row label { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
    .filter-row input[type="text"]{
      width: 100%;
      padding: 7px 9px;
      border: 1px solid rgba(0,0,0,0.22);
      border-radius: 10px;
      outline: none;
    }
    .filter-actions { display:flex; gap:8px; margin-top:8px; }
    .btn{
      flex:1;
      padding: 7px 9px;
      border: 1px solid rgba(0,0,0,0.22);
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn:hover{ background:#f4f4f4; }

    /* Bolt marker */
    .boltWrap{
      width: 36px; height: 36px;
      border-radius: 999px;
      display:flex; align-items:center; justify-content:center;
      border: 2px solid rgba(0,0,0,0.18);
      box-shadow: 0 2px 12px rgba(0,0,0,0.20);
      position: relative;
      transform: translate(-50%, -50%);
    }
    .boltSVG{ width: 18px; height: 18px; display:block; }
    .badge{
      position:absolute;
      right:-7px; top:-7px;
      min-width: 16px; height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 11px;
      line-height: 16px;
      text-align:center;
      border: 2px solid #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,0.18);
      display:none;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    // Map init
    const map = L.map('map', { preferCanvas: true });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // CSV (root of GitHub Pages)
    const CSV_URL = 'https://flashe24v.github.io/South_of_Canal_St.csv';

    // Layers
    const markerLayer = L.layerGroup().addTo(map);
    const lineLayer   = L.layerGroup().addTo(map);

    // Data
    let allRows = [];

    // Helpers
    function norm(v) {
      return String(v || '').toLowerCase().replace(/\s+/g,' ').trim();
    }

    function metersToLatDeg(m) { return m / 111320; }
    function metersToLngDeg(m, atLat) { return m / (111320 * Math.cos(atLat * Math.PI / 180)); }

    // Group "same spot" more aggressively so they fan out more
    function keyFor(lat, lng) {
      const p = 4; // 4-decimal grouping (~10m-ish)
      return `${lat.toFixed(p)},${lng.toFixed(p)}`;
    }

    // Bigger spacing + leader lines back to the true coordinate
    function offsetPoint(lat, lng, indexInBucket) {
      if (indexInBucket === 0) return [lat, lng];

      const angle = (indexInBucket * 137.5) * Math.PI / 180; // golden angle
      const radiusMeters = 35 + (Math.floor(indexInBucket / 8) * 15); // wide fan-out

      const dLat = metersToLatDeg(radiusMeters) * Math.sin(angle);
      const dLng = metersToLngDeg(radiusMeters, lat) * Math.cos(angle);

      return [lat + dLat, lng + dLng];
    }

    function appleMapsLink(lat, lng) {
      return `https://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`;
    }
    function googleMapsLink(lat, lng) {
      return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    }

    function boltIcon(chargerType, portsTotal) {
      const isL3 = norm(chargerType).includes('level 3') || norm(chargerType).includes('l3');
      const bg = isL3 ? '#00c2ff' : '#00e08a';
      const boltFill = '#0b0b0b';

      const badge = (portsTotal && String(portsTotal).trim() !== '' && String(portsTotal) !== '0')
        ? `<div class="badge" style="display:block;">${String(portsTotal)}</div>`
        : `<div class="badge"></div>`;

      const html = `
        <div class="boltWrap" style="background:${bg}">
          ${badge}
          <svg class="boltSVG" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="${boltFill}" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"></path>
          </svg>
        </div>
      `;

      return L.divIcon({
        className: '',
        html,
        iconSize: [36, 36],
        iconAnchor: [18, 18],
        popupAnchor: [0, -18]
      });
    }

    // Filter state
    const state = { showL2: true, showL3: true, search: '' };

    function isLevel2(r) {
      const t1 = norm(r['Charger type']);
      const t2 = norm(r['Charger type (legend)']);
      return t1.includes('level 2') || t1.includes('l2') || t2.includes('level 2') || t2.includes('l2');
    }
    function isLevel3(r) {
      const t1 = norm(r['Charger type']);
      const t2 = norm(r['Charger type (legend)']);
      return t1.includes('level 3') || t1.includes('l3') || t2.includes('level 3') || t2.includes('l3');
    }

    function rowMatchesFilters(r) {
      const l2 = isLevel2(r);
      const l3 = isLevel3(r);

      if (!state.showL2 && l2) return false;
      if (!state.showL3 && l3) return false;
      if (!state.showL2 && !state.showL3) return false;

      if (state.search) {
        const hay = [
          r['stationName'], r['Address'], r['City'], r['State'], r['postalCode'], r['stationModel']
        ].filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(state.search)) return false;
      }
      return true;
    }

    // Filter control UI
    const FilterControl = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function() {
        const div = L.DomUtil.create('div', 'filter-panel');

        const title = L.DomUtil.create('div', 'filter-title', div);
        title.textContent = 'Filters';

        const row1 = L.DomUtil.create('div', 'filter-row', div);

        const lblL2 = document.createElement('label');
        const chkL2 = document.createElement('input');
        chkL2.type = 'checkbox'; chkL2.checked = true;
        lblL2.appendChild(chkL2);
        lblL2.appendChild(document.createTextNode('Level 2'));
        row1.appendChild(lblL2);

        const lblL3 = document.createElement('label');
        const chkL3 = document.createElement('input');
        chkL3.type = 'checkbox'; chkL3.checked = true;
        lblL3.appendChild(chkL3);
        lblL3.appendChild(document.createTextNode('Level 3'));
        row1.appendChild(lblL3);

        const row2 = L.DomUtil.create('div', 'filter-row', div);
        const txt = document.createElement('input');
        txt.type = 'text';
        txt.placeholder = 'Search station / address...';
        row2.appendChild(txt);

        const actions = L.DomUtil.create('div', 'filter-actions', div);
        const btnApply = document.createElement('button');
        btnApply.className = 'btn';
        btnApply.textContent = 'Apply';
        const btnReset = document.createElement('button');
        btnReset.className = 'btn';
        btnReset.textContent = 'Reset';
        actions.appendChild(btnApply);
        actions.appendChild(btnReset);

        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);

        function applyNow() {
          state.showL2 = chkL2.checked;
          state.showL3 = chkL3.checked;
          state.search = (txt.value || '').trim().toLowerCase();
          render();
        }

        btnApply.addEventListener('click', applyNow);
        btnReset.addEventListener('click', () => {
          chkL2.checked = true;
          chkL3.checked = true;
          txt.value = '';
          state.showL2 = true;
          state.showL3 = true;
          state.search = '';
          render(true);
        });

        // live update
        chkL2.addEventListener('change', applyNow);
        chkL3.addEventListener('change', applyNow);
        txt.addEventListener('keydown', (e) => { if (e.key === 'Enter') applyNow(); });

        return div;
      }
    });
    map.addControl(new FilterControl());

    // Render
    function render(zoomToMarkers=false) {
      markerLayer.clearLayers();
      lineLayer.clearLayers();

      const buckets = new Map();
      const markers = [];

      allRows.forEach((r) => {
        const lat = parseFloat(r['Lat']);
        const lng = parseFloat(r['Long']);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        if (!rowMatchesFilters(r)) return;

        const key = keyFor(lat, lng);
        const count = buckets.get(key) ?? 0;
        buckets.set(key, count + 1);

        const [lat2, lng2] = offsetPoint(lat, lng, count);

        // leader line + true dot
        if (count > 0) {
          L.polyline([[lat, lng], [lat2, lng2]], { weight: 2, opacity: 0.65 }).addTo(lineLayer);
        }
        L.circleMarker([lat, lng], { radius: 3, opacity: 0.9, fillOpacity: 0.9 }).addTo(lineLayer);

        const name = r['stationName'] || 'Station';
        const address = r['Address'] || '';
        const city = r['City'] || '';
        const st = r['State'] || '';
        const zip = r['postalCode'] || '';
        const chargerType = r['Charger type'] || '';
        const model = r['stationModel'] || '';
        const ports = r['ports_total'] || '';

        const popup = `
          <b>${name}</b><br/>
          ${chargerType ? `${chargerType}<br/>` : ''}
          ${model ? `Model: ${model}<br/>` : ''}
          ${ports ? `Ports: ${ports}<br/>` : ''}
          ${address ? `${address}<br/>` : ''}
          ${(city || st || zip) ? `${city}${city && st ? ', ' : ''}${st} ${zip}<br/>` : ''}
          <div style="margin-top:6px;">
            <a href="${googleMapsLink(lat, lng)}" target="_blank" rel="noopener">Google Maps</a>
            &nbsp;|&nbsp;
            <a href="${appleMapsLink(lat, lng)}" target="_blank" rel="noopener">Apple Maps</a>
          </div>
        `;

        const icon = boltIcon(chargerType, ports);

        // zIndexOffset helps ensure "last one" (e.g., REVEL) is visible/clickable
        const m = L.marker([lat2, lng2], { icon, zIndexOffset: 1000 + count }).addTo(markerLayer);
        m.bindPopup(popup);
        markers.push(m);
      });

      if (markers.length) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.15));
      } else if (zoomToMarkers) {
        // if nothing matches, keep map where it is
      }
    }

    // Load CSV
    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: ({ data }) => {
        allRows = data || [];
        render(true);
      },
      error: (err) => {
        console.error('CSV load error:', err);
        alert('Could not load CSV. Confirm the GitHub Pages URL is correct and public.');
      }
    });
  </script>
</body>
</html>
